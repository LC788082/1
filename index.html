<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Island · 灵动岛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
   * 全局重置与基础变量
   * ============================================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #e8e4dc;
    --bg-deep: #d6d2c9;
    --ink: #0a0a0b;
    --island: #000000;
    --fg: #ffffff;
    --fg-soft: rgba(255, 255, 255, 0.58);
    --fg-faint: rgba(255, 255, 255, 0.24);
    
    --c-green: #30d158;
    --c-orange: #ff9f0a;
    --c-red: #ff453a;
    --c-blue: #0a84ff;
    --c-purple: #bf5af2;
    
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ============================================================
   * 顶部信息栏
   * ============================================================ */
  .top-bar {
    padding: 28px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ink);
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .top-meta {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: rgba(10, 10, 11, 0.5);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .top-meta::before {
    content: '';
    width: 24px;
    height: 1px;
    background: rgba(10, 10, 11, 0.3);
  }

  /* ============================================================
   * 灵动岛舞台
   * ============================================================ */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
  }

  .island {
    width: 200px;
    height: 37px;
    background: var(--island);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    will-change: width, height, border-radius;
    cursor: pointer;
    transform: translateZ(0);
  }

  /* ============================================================
   * 状态内容基础容器
   * ============================================================ */
  .state {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 180ms ease, transform 240ms var(--ease-spring);
    pointer-events: none;
    padding: 0 14px;
    color: var(--fg);
    user-select: none;
  }

  .state.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
    transition: opacity 200ms ease 90ms, transform 300ms var(--ease-spring) 90ms;
  }

  .state-default {
    padding: 0;
  }

  /* ============================================================
   * 状态：通知
   * ============================================================ */
  .state-notification {
    justify-content: space-between;
    gap: 12px;
    padding: 0 16px;
  }

  .notif-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9f0a, #ff453a);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .notif-icon svg {
    width: 19px;
    height: 19px;
    fill: #fff;
  }

  .notif-body {
    flex: 1;
    min-width: 0;
  }

  .notif-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.25;
  }

  .notif-text {
    font-size: 12.5px;
    color: var(--fg-soft);
    line-height: 1.3;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .notif-time {
    font-size: 10px;
    color: var(--fg-faint);
    font-family: 'Space Grotesk', sans-serif;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  /* ============================================================
   * 状态：音乐
   * ============================================================ */
  .state-music {
    gap: 13px;
    padding: 0 14px;
  }

  .album-art {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: linear-gradient(135deg, #bf5af2 0%, #5e5ce6 55%, #0a84ff 100%);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .album-art::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 28% 28%, rgba(255,255,255,0.4), transparent 55%);
  }

  .music-info {
    flex: 1;
    min-width: 0;
  }

  .music-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .music-artist {
    font-size: 11.5px;
    color: var(--fg-soft);
    margin-top: 3px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .music-progress {
    margin-top: 8px;
    height: 2.5px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    overflow: hidden;
  }

  .music-progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
  }

  .music-controls {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .music-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.18s, transform 0.18s;
  }

  .music-btn:hover {
    background: rgba(255,255,255,0.2);
  }

  .music-btn:active {
    transform: scale(0.9);
  }

  .music-btn svg {
    width: 14px;
    height: 14px;
    fill: #fff;
  }

  /* ============================================================
   * 状态：通话
   * ============================================================ */
  .state-call {
    gap: 13px;
    padding: 0 14px;
  }

  .call-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #30d158, #0a84ff);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    font-weight: 600;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
  }

  .call-info {
    flex: 1;
    min-width: 0;
  }

  .call-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
  }

  .call-status {
    font-size: 11.5px;
    color: var(--c-green);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Grotesk', sans-serif;
  }

  .call-status::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--c-green);
  }

  .call-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .call-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.18s;
  }

  .call-btn:active {
    transform: scale(0.9);
  }

  .call-btn.mute {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .call-btn.end {
    background: var(--c-red);
    color: #fff;
  }

  .call-btn svg {
    width: 15px;
    height: 15px;
    fill: currentColor;
  }

  /* ============================================================
   * 状态：大圆钟倒计时 (修复指针 Bug)
   * ============================================================ */
  .state-timer {
    gap: 18px;
    padding: 0 22px;
  }

  .timer-clock {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
    position: relative;
  }

  .timer-clock-svg {
    width: 100%;
    height: 100%;
  }

  .clock-bg {
    fill: none;
    stroke: rgba(255,255,255,0.12);
    stroke-width: 2;
  }

  /* 进度环：使用 SVG 原生 transform 旋转，避免 CSS transform-origin 在 Safari 失效 */
  .clock-prog {
    fill: none;
    stroke: var(--c-orange);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .clock-ticks line {
    stroke: rgba(255,255,255,0.4);
    stroke-width: 2;
    stroke-linecap: round;
  }

  /* 指针：移除所有 CSS transform，统一由 JS 设置 SVG 属性 */
  .hand-hour {
    stroke: #fff;
    stroke-width: 3.5;
    stroke-linecap: round;
  }

  .hand-min {
    stroke: rgba(255,255,255,0.85);
    stroke-width: 2;
    stroke-linecap: round;
  }

  .clock-center {
    fill: #fff;
  }

  .timer-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .timer-label {
    font-size: 11px;
    color: var(--fg-soft);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: 'Space Grotesk', sans-serif;
  }

  .timer-time {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    margin-bottom: 12px;
  }

  .timer-control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timer-btn-small {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.18s, background 0.18s;
  }

  .timer-btn-small:hover {
    background: rgba(255,255,255,0.25);
  }

  .timer-btn-small:active {
    transform: scale(0.9);
  }

  .timer-btn-small svg {
    width: 11px;
    height: 11px;
    fill: #fff;
  }

  .timer-progress-text {
    font-size: 10.5px;
    color: var(--fg-soft);
    font-family: 'Space Grotesk', sans-serif;
  }

  /* ============================================================
   * 状态：充电
   * ============================================================ */
  .state-charge {
    justify-content: center;
    gap: 11px;
    padding: 0 18px;
  }

  .charge-icon {
    width: 24px;
    height: 24px;
    color: var(--c-green);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .charge-icon svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  .charge-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .charge-percent {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .charge-batt {
    width: 26px;
    height: 13px;
    border: 1.3px solid rgba(255,255,255,0.5);
    border-radius: 3px;
    padding: 1.5px;
    position: relative;
  }

  .charge-batt::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 3.5px;
    width: 2px;
    height: 5px;
    background: rgba(255,255,255,0.5);
    border-radius: 0 1px 1px 0;
  }

  .charge-batt-fill {
    height: 100%;
    width: 86%;
    background: var(--c-green);
    border-radius: 1px;
  }

  /* ============================================================
   * 状态：Face ID (大圆 + 扫描线)
   * ============================================================ */
  .state-faceid {
    padding: 0;
  }

  .faceid-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .faceid-ring {
    position: absolute;
    width: 82%;
    height: 82%;
    transform: rotate(-90deg);
  }

  .faceid-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.5;
  }

  .faceid-ring-prog {
    fill: none;
    stroke: #4d9eff;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke 0.3s;
  }

  .faceid-ring-prog.success {
    stroke: #30d158;
  }

  .faceid-scan {
    position: absolute;
    width: 58%;
    height: 2px;
    top: 50%;
    left: 50%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(77,158,255,0.15) 12%,
      rgba(77,158,255,0.6) 35%,
      #6dadff 50%,
      rgba(77,158,255,0.6) 65%,
      rgba(77,158,255,0.15) 88%,
      transparent 100%);
    border-radius: 1px;
    will-change: transform, opacity;
    transform: translate(-50%, 0px);
    transition: opacity 0.2s;
  }

  .faceid-scan.success {
    opacity: 0;
  }

  .faceid-check {
    position: absolute;
    width: 30%;
    height: 30%;
    color: #30d158;
    opacity: 0;
    transform: scale(0.4);
    transition: opacity 0.25s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .faceid-check.show {
    opacity: 1;
    transform: scale(1);
  }

  .faceid-check svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  .faceid-label {
    position: absolute;
    bottom: 14%;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    color: var(--fg-soft);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ============================================================
   * 状态：分屏多任务
   * ============================================================ */
  .state-split {
    padding: 10px;
    gap: 8px;
  }

  .split-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 22px;
    padding: 14px 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .split-head {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .split-icon {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .split-icon svg {
    width: 13px;
    height: 13px;
    fill: #fff;
  }

  .split-icon.music {
    background: linear-gradient(135deg, #bf5af2, #0a84ff);
  }

  .split-icon.timer {
    background: linear-gradient(135deg, #ff9f0a, #ff453a);
  }

  .split-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--fg-soft);
    letter-spacing: 0.02em;
  }

  .split-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    line-height: 1.1;
    margin-top: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .split-sub {
    font-size: 10.5px;
    color: var(--fg-soft);
    margin-top: 4px;
  }

  .split-progress {
    height: 2.5px;
    background: rgba(255,255,255,0.15);
    border-radius: 1px;
    margin-top: 10px;
    overflow: hidden;
  }

  .split-progress-fill {
    height: 100%;
    background: var(--c-purple);
    border-radius: 1px;
  }

  .split-progress-fill.orange {
    background: var(--c-orange);
  }

  /* ============================================================
   * 底部控制栏
   * ============================================================ */
  .controls {
    padding: 24px 40px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
  }

  .controls-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    color: rgba(10,10,11,0.45);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .controls-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 760px;
  }

  .ctrl-btn {
    padding: 9px 14px;
    border-radius: 100px;
    background: rgba(10,10,11,0.05);
    border: 1px solid rgba(10,10,11,0.08);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .ctrl-btn:hover {
    background: rgba(10,10,11,0.09);
    border-color: rgba(10,10,11,0.15);
  }

  .ctrl-btn:active {
    transform: scale(0.96);
  }

  .ctrl-btn.active {
    background: var(--ink);
    color: var(--fg);
    border-color: var(--ink);
  }

  .ctrl-btn .key {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9.5px;
    opacity: 0.5;
    padding: 2px 5px;
    border: 1px solid currentColor;
    border-radius: 4px;
    line-height: 1;
    font-weight: 600;
  }

  .ctrl-btn.active .key {
    opacity: 0.65;
  }

  /* ============================================================
   * 自动演示控制面板
   * ============================================================ */
  .auto-panel {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 4px;
    padding: 10px 18px;
    background: rgba(10,10,11,0.04);
    border-radius: 100px;
    border: 1px solid rgba(10,10,11,0.06);
  }

  .auto-btn {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid rgba(10,10,11,0.2);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
  }

  .auto-btn:hover {
    background: rgba(10,10,11,0.06);
  }

  .auto-btn.active {
    background: var(--c-blue);
    color: #fff;
    border-color: var(--c-blue);
  }

  .auto-btn svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: rgba(10,10,11,0.6);
    font-family: 'Space Grotesk', sans-serif;
  }

  .speed-control input[type="range"] {
    width: 120px;
    height: 4px;
    background: rgba(10,10,11,0.1);
    border-radius: 2px;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    outline: none;
  }

  .speed-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .speed-control input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .speed-control input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
  }

  .speed-value {
    width: 34px;
    text-align: right;
    font-weight: 600;
    color: var(--ink);
  }

  /* ============================================================
   * 底部提示
   * ============================================================ */
  .hint {
    text-align: center;
    font-size: 11px;
    color: rgba(10,10,11,0.4);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.06em;
    padding-bottom: 6px;
  }

  .hint kbd {
    font-family: inherit;
    padding: 1px 6px;
    border: 1px solid rgba(10,10,11,0.25);
    border-radius: 4px;
    font-size: 10px;
    margin: 0 2px;
  }

  /* ============================================================
   * 响应式适配
   * ============================================================ */
  @media (max-width: 720px) {
    .top-bar {
      padding: 18px 20px;
    }
    .controls {
      padding: 16px 14px 20px;
    }
    .ctrl-btn {
      padding: 7px 11px;
      font-size: 11px;
      gap: 5px;
    }
    .ctrl-btn .key {
      display: none;
    }
    .auto-panel {
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border-radius: 24px;
    }
    .speed-control input[type="range"] {
      width: 100px;

  </section>

<script>
  /* ============================================================
   * 纯净版 Spring 物理引擎
   * ============================================================ */
  function createSpring(initialValue, config, callback) {
    let current = initialValue;
    let target = initialValue;
    let velocity = 0;
    
    let stiffness = config.stiffness || 200;
    let damping = config.damping || 20;
    let mass = config.mass || 1;
    
    let rafId = null;
    let lastTime = 0;

    function tick(time) {
      if (lastTime === 0) {
        lastTime = time;
        rafId = requestAnimationFrame(tick);
        return;
      }

      let dt = (time - lastTime) / 1000;
      lastTime = time;

      if (dt > 0.05) dt = 0.05;
      if (dt < 0.0005) dt = 0.0005;

      const force = -stiffness * (current - target);
      const dampForce = -damping * velocity;
      const acceleration = (force + dampForce) / mass;
      velocity += acceleration * dt;
      current += velocity * dt;

      callback(current);

      if (Math.abs(current - target) < 0.1 && Math.abs(velocity) < 0.1) {
        current = target;
        velocity = 0;
        callback(current);
        rafId = null;
        return;
      }

      rafId = requestAnimationFrame(tick);
    }

    return {
      setTarget: function(newTarget, impulse) {
        if (impulse === undefined) impulse = 0;
        target = newTarget;
        if (impulse !== 0) {
          velocity += impulse;
        }
        if (rafId === null) {
          lastTime = 0;
          rafId = requestAnimationFrame(tick);
        }
      },
      getCurrent: function() {
        return current;
      },
      setDamping: function(newDamping) {
        damping = newDamping;
      },
      setStiffness: function(newStiffness) {
        stiffness = newStiffness;
      }
    };
  }

  /* ============================================================
   * 状态尺寸定义表
   * ============================================================ */
  const STATES = {
    default:      { width: 200, height: 37,  radius: 22  },
    notification: { width: 380, height: 92,  radius: 32  },
    music:        { width: 380, height: 92,  radius: 32  },
    call:         { width: 400, height: 104, radius: 36  },
    timer:        { width: 320, height: 160, radius: 38  },
    charge:       { width: 220, height: 60,  radius: 28  },
    faceid:       { width: 240, height: 240, radius: 120 },
    split:        { width: 440, height: 180, radius: 40  }
  };

  /* ============================================================
   * DOM 元素获取
   * ============================================================ */
  const island = document.getElementById('island');
  
  const widthSpring = createSpring(200, { stiffness: 165, damping: 13, mass: 1.0 }, function(v) {
    island.style.width = v.toFixed(2) + 'px';
  });
  
  const heightSpring = createSpring(37, { stiffness: 230, damping: 13, mass: 1.5 }, function(v) {
    island.style.height = v.toFixed(2) + 'px';
  });
  
  const radiusSpring = createSpring(22, { stiffness: 280, damping: 16, mass: 0.7 }, function(v) {
    island.style.borderRadius = v.toFixed(2) + 'px';
  });

  /* ============================================================
   * 状态切换核心逻辑
   * ============================================================ */
  let currentState = 'default';
  let stateTimers = [];

  function transitionTo(stateKey) {
    const state = STATES[stateKey];
    if (!state) return;

    const wDelta = Math.abs(state.width - widthSpring.getCurrent());
    const hDelta = Math.abs(state.height - heightSpring.getCurrent());

    widthSpring.setDamping(wDelta > 150 ? 10 : (wDelta > 60 ? 13 : 17));
    heightSpring.setDamping(hDelta > 100 ? 10 : (hDelta > 40 ? 13 : 17));

    const wImpulse = (state.width - widthSpring.getCurrent()) * (wDelta > 100 ? 1.6 : 0.9);
    const hImpulse = (state.height - heightSpring.getCurrent()) * (hDelta > 80 ? 1.7 : 1.0);
    const rImpulse = (state.radius - radiusSpring.getCurrent()) * 0.5;

    widthSpring.setTarget(state.width, wImpulse);
    heightSpring.setTarget(state.height, hImpulse);
    radiusSpring.setTarget(state.radius, rImpulse);

    const allStates = island.querySelectorAll('.state');
    for (let i = 0; i < allStates.length; i++) {
      if (allStates[i].dataset.state === stateKey) {
        allStates[i].classList.add('active');
      } else {
        allStates[i].classList.remove('active');
      }
    }

    const allBtns = document.querySelectorAll('.ctrl-btn');
    for (let i = 0; i < allBtns.length; i++) {
      if (allBtns[i].dataset.target === stateKey) {
        allBtns[i].classList.add('active');
      } else {
        allBtns[i].classList.remove('active');
      }
    }

    for (let i = 0; i < stateTimers.length; i++) {
      clearTimeout(stateTimers[i]);
    }
    stateTimers = [];

    currentState = stateKey;

    if (stateKey === 'faceid') {
      startFaceid();
    } else {
      stopFaceid();
    }

    // 倒计时状态特殊处理：重置时间与指针，防止脏数据残留
    if (stateKey === 'timer') {
      timerElapsed = 0;
      timerPaused = false;
      const timerIconEl = document.getElementById('timerIcon');
      if (timerIconEl) {
        timerIconEl.innerHTML = '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>';
      }
      // 立即渲染一次初始状态，避免从其他状态切过来时指针角度残留
      renderTimerUI(timerDuration, 0);
    }

    timerTaskActive = (stateKey === 'timer' || stateKey === 'split');
    callTaskActive = (stateKey === 'call');
    musicTaskActive = (stateKey === 'music');

    if (stateKey === 'notification' && !isAutoDemo) {
      stateTimers.push(setTimeout(function() {
        if (currentState === 'notification') {
          transitionTo('default');
        }
      }, 5000));
    }

    startTaskLoop();
  }

  /* ============================================================
   * 自动演示循环系统
   * ============================================================ */
  let isAutoDemo = false;
  let autoDemoSpeed = 1.0;
  let autoDemoTimer = null;
  let autoDemoIndex = 0;
  
  const demoSequence = ['notification', 'music', 'call', 'timer', 'charge', 'faceid', 'split', 'default'];
  const demoDurations = {
    default: 1500,
    notification: 3500,
    music: 4000,
    call: 3500,
    timer: 4500,
    charge: 2500,
    faceid: 3000,
    split: 4000
  };

  const autoBtn = document.getElementById('autoBtn');
  const autoIcon = document.getElementById('autoIcon');
  const autoText = document.getElementById('autoText');
  const speedSlider = document.getElementById('speedSlider');
  const speedValue = document.getElementById('speedValue');

  function startAutoDemo() {
    isAutoDemo = true;
    autoBtn.classList.add('active');
    autoIcon.innerHTML = '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>';
    autoText.textContent = '停止演示';
    autoDemoIndex = 0;
    runAutoDemoStep();
  }

  function stopAutoDemo() {
    isAutoDemo = false;
    autoBtn.classList.remove('active');
    autoIcon.innerHTML = '<path d="M8 5v14l11-7L8 5z"/>';
    autoText.textContent = '自动演示';
    if (autoDemoTimer) {
      clearTimeout(autoDemoTimer);
      autoDemoTimer = null;
    }
  }

  function runAutoDemoStep() {
    if (!isAutoDemo) return;
    
    const state = demoSequence[autoDemoIndex];
    transitionTo(state);
    
    const duration = demoDurations[state] / autoDemoSpeed;
    
    autoDemoTimer = setTimeout(function() {
      autoDemoIndex = (autoDemoIndex + 1) % demoSequence.length;
      runAutoDemoStep();
    }, duration);
  }

  autoBtn.addEventListener('click', function() {
    if (isAutoDemo) {
      stopAutoDemo();
    } else {
      startAutoDemo();
    }
  });

  speedSlider.addEventListener('input', function(e) {
    autoDemoSpeed = parseFloat(e.target.value);
    speedValue.textContent = autoDemoSpeed.toFixed(1) + 'x';
    
    if (isAutoDemo && autoDemoTimer) {
      clearTimeout(autoDemoTimer);
      autoDemoIndex = (autoDemoIndex + 1) % demoSequence.length;
      runAutoDemoStep();
    }
  });

  /* ============================================================
   * 任务循环系统
   * ============================================================ */
  let taskRafId = null;
  let taskLastTime = 0;
  let timerTaskActive = false;
  let callTaskActive = false;
  let musicTaskActive = false;

  function startTaskLoop() {
    if (taskRafId !== null) return;
    taskLastTime = 0;
    taskRafId = requestAnimationFrame(taskLoop);
  }

  function taskLoop(time) {
    if (taskLastTime === 0) {
      taskLastTime = time;
      taskRafId = requestAnimationFrame(taskLoop);
      return;
    }

    let dt = (time - taskLastTime) / 1000;
    taskLastTime = time;
    if (dt > 0.05) dt = 0.05;
    if (dt < 0.0005) dt = 0.0005;

    let anyActive = false;

    if (timerTaskActive) {
      updateTimer(dt);
      anyActive = true;
    }

    if (callTaskActive) {
      updateCall(dt);
      anyActive = true;
    }

    if (musicTaskActive) {
      updateMusic(dt);
      anyActive = true;
    }

    if (!anyActive && !faceidTaskActive) {
      taskRafId = null;
      return;
    }

    taskRafId = requestAnimationFrame(taskLoop);
  }

  /* ============================================================
   * Face ID 扫描任务
   * ============================================================ */
  const faceidScan = document.getElementById('faceidScan');
  const faceidRing = document.getElementById('faceidRing');
  const faceidCheck = document.getElementById('faceidCheck');
  const faceidText = document.getElementById('faceidText');
  const RING_CIRC = 2 * Math.PI * 46;
  faceidRing.style.strokeDasharray = RING_CIRC;
  faceidRing.style.strokeDashoffset = RING_CIRC;

  let faceidRafId = null;
  let faceidStartTime = 0;
  let faceidPhase = 'idle';
  let faceidTaskActive = false;

  function startFaceid() {
    faceidPhase = 'scanning';
    faceidTaskActive = true;
    faceidStartTime = performance.now();
    
    faceidScan.classList.remove('success');
    faceidRing.classList.remove('success');
    faceidCheck.classList.remove('show');
    faceidRing.style.strokeDashoffset = RING_CIRC;
    faceidText.textContent = '认证中';
    
    if (faceidRafId === null) {
      faceidRafId = requestAnimationFrame(updateFaceid);
    }
  }

  function stopFaceid() {
    faceidTaskActive = false;
    faceidPhase = 'idle';
    if (faceidRafId !== null) {
      cancelAnimationFrame(faceidRafId);
      faceidRafId = null;
    }
  }

  function updateFaceid(time) {
    if (!faceidTaskActive) {
      faceidRafId = null;
      return;
    }

    const elapsed = (time - faceidStartTime) / 1000;

    if (faceidPhase === 'scanning') {
      const t = elapsed / 1.5;
      const y = Math.sin(t * Math.PI * 2) * 55;
      faceidScan.style.transform = 'translate(-50%, ' + y.toFixed(2) + 'px)';

      const progress = Math.min(1, elapsed / 1.5);
      faceidRing.style.strokeDashoffset = ((1 - progress) * RING_CIRC).toFixed(2);

      if (elapsed >= 1.5) {
        faceidPhase = 'success';
        faceidScan.classList.add('success');
        faceidRing.classList.add('success');
        faceidCheck.classList.add('show');
        faceidText.textContent = '已认证';
      }
    } else if (faceidPhase === 'success') {
      if (elapsed >= 2.4) {
        faceidPhase = 'done';
        faceidTaskActive = false;
        stopFaceid();
        if (!isAutoDemo && currentState === 'faceid') {
          transitionTo('default');
        }
        return;
      }
    }

    faceidRafId = requestAnimationFrame(updateFaceid);
  }

  /* ============================================================
   * 大圆钟倒计时任务逻辑 (彻底修复指针 Bug)
   * ============================================================ */
  const CIRC = 2 * Math.PI * 54; // r=54
  const timerCircleEl = document.getElementById('timerCircle');
  const timerTimeEl = document.getElementById('timerTime');
  const timerHourHand = document.getElementById('timerHourHand');
  const timerMinHand = document.getElementById('timerMinHand');
  const timerProgressText = document.getElementById('timerProgressText');
  const splitTimerEl = document.getElementById('splitTimer');
  const splitProgEl = document.getElementById('splitTimerProg');
  
  timerCircleEl.style.strokeDasharray = CIRC;

  let timerDuration = 180; // 3 分钟
  let timerElapsed = 0;
  let timerPaused = false;

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // 抽离 UI 渲染逻辑，方便在重置时立即调用一次
  function renderTimerUI(remaining, progress) {
    if (currentState === 'timer') {
      timerTimeEl.textContent = formatTime(remaining);
      
      // 进度环填充：从 0 顺时针填满
      timerCircleEl.style.strokeDashoffset = ((1 - progress) * CIRC).toFixed(2);
      
      // 时针：180秒(3分钟)转一圈，顺时针
      const hourAngle = (timerElapsed / 180) * 360;
      // 使用 setAttribute('transform', ...) 设置 SVG 原生属性，不依赖 CSS transform-origin
      timerHourHand.setAttribute('transform', 'rotate(' + hourAngle.toFixed(2) + ' 60 60)');
      
      // 分针：60秒(1分钟)转一圈，顺时针
      const minAngle = (timerElapsed / 60) * 360;
      timerMinHand.setAttribute('transform', 'rotate(' + minAngle.toFixed(2) + ' 60 60)');
      
      if (timerPaused) {
        timerProgressText.textContent = '已暂停';
      } else if (remaining <= 0) {
        timerProgressText.textContent = '已完成';
      } else {
        timerProgressText.textContent = '进行中';
      }
    } else if (currentState === 'split') {
      splitTimerEl.textContent = formatTime(remaining);
      splitProgEl.style.width = (progress * 100).toFixed(1) + '%';
    }
  }

  function updateTimer(dt) {
    if (timerPaused || timerElapsed >= timerDuration) {
      // 即使停止也刷新一次文字状态
      if (timerElapsed >= timerDuration) {
        timerProgressText.textContent = '已完成';
      } else {
        timerProgressText.textContent = '已暂停';
      }
      return;
    }
    
    timerElapsed += dt;
    if (timerElapsed > timerDuration) timerElapsed = timerDuration;
    
    const remaining = timerDuration - timerElapsed;
    const progress = timerElapsed / timerDuration; // 0 到 1
    
    renderTimerUI(remaining, progress);
  }

  document.getElementById('timerToggle').addEventListener('click', function(e) {
    e.stopPropagation();
    timerPaused = !timerPaused;
    const icon = document.getElementById('timerIcon');
    if (timerPaused) {
      icon.innerHTML = '<path d="M8 5v14l11-7L8 5z"/>';
      timerProgressText.textContent = '已暂停';
    } else {
      icon.innerHTML = '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>';
      timerProgressText.textContent = '进行中';
    }
  });

  /* ============================================================
   * 通话时长任务逻辑
   * ============================================================ */
  let callElapsed = 154;
  const callTimeEl = document.getElementById('callTime');

  function updateCall(dt) {
    callElapsed += dt;
    callTimeEl.textContent = formatTime(callElapsed);
  }

  document.getElementById('endCallBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    if (isAutoDemo) stopAutoDemo();
    transitionTo('default');
  });

  /* ============================================================
   * 音乐进度任务逻辑
   * ============================================================ */
  let musicProgress = 0.42;
  let musicPlaying = true;
  const musicFillEl = document.getElementById('musicFill');
  const playIcon = document.getElementById('playIcon');

  function updateMusic(dt) {
    if (!musicPlaying) return;
    musicProgress += dt / 245;
    if (musicProgress > 1) musicProgress = 0;
    musicFillEl.style.width = (musicProgress * 100).toFixed(2) + '%';
  }

  document.getElementById('playBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    musicPlaying = !musicPlaying;
    if (musicPlaying) {
      playIcon.innerHTML = '<path d="M8 5v14l11-7L8 5z"/>';
    } else {
      playIcon.innerHTML = '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>';
    }
  });

  /* ============================================================
   * 事件绑定
   * ============================================================ */
  const ctrlBtns = document.querySelectorAll('.ctrl-btn');
  for (let i = 0; i < ctrlBtns.length; i++) {
    ctrlBtns[i].addEventListener('click', function() {
      if (isAutoDemo) stopAutoDemo();
      transitionTo(this.dataset.target);
    });
  }

  island.addEventListener('click', function() {
    if (currentState !== 'default') {
      if (isAutoDemo) stopAutoDemo();
      transitionTo('default');
    }
  });

  const keyMap = {
    '1': 'default',
    '2': 'notification',
    '3': 'music',
    '4': 'call',
    '5': 'timer',
    '6': 'charge',
    '7': 'faceid',
    '8': 'split'
  };
  
  document.addEventListener('keydown', function(e) {
    if (e.key === '0') {
      if (isAutoDemo) stopAutoDemo();
      else startAutoDemo();
      return;
    }
    
    if (keyMap[e.key]) {
      e.preventDefault();
      if (isAutoDemo) stopAutoDemo();
      transitionTo(keyMap[e.key]);
    }
  });

  const innerBtns = document.querySelectorAll('.state button');
  for (let i = 0; i < innerBtns.length; i++) {
    innerBtns[i].addEventListener('click', function(e) {
      e.stopPropagation();
    });
  }
</script>
</body>
</html>
