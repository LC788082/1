<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Dynamic Island</title>
<style>
:root {
  --bg: #f4f4f6;
  --fg: #1d1d1f;
  --fg-2: rgba(29, 29, 31, 0.65);
  --fg-3: rgba(29, 29, 31, 0.4);
  --island: #000000;
  --orange: #ff9f0a;
  --green: #30d158;
  --blue: #0a84ff;
  --red: #ff453a;
  --pink: #ff375f;
  --purple: #bf5af2;
  --teal: #64d2ff;
  --yellow: #ffd60a;
  --indigo: #5e5ce6;
  --spring: cubic-bezier(0.32, 0.72, 0, 1);
  --spring-soft: cubic-bezier(0.34, 1.3, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --island-scale: 1;
  --accent: #30d158;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  letter-spacing: -0.01em;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
}

body {
  background: linear-gradient(180deg, #fafafa 0%, #ececef 100%);
  position: relative;
}

/* 背景光晕：纯径向渐变，零滤镜 */
body::after {
  content: '';
  position: fixed; top: -10%; left: 50%;
  transform: translateX(-50%);
  width: 100vw; height: 60vh;
  background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 55%);
  opacity: 0.05;
  pointer-events: none; z-index: 0;
  transition: background 1s var(--ease-out);
}

/* 装饰性网格背景 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 1;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
}

/* 舞台 */
.stage {
  position: relative; width: 100%; height: 100vh; height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding-top: calc(40px + var(--safe-top));
  padding-bottom: calc(250px + var(--safe-bottom));
  z-index: 10;
}

.island-wrap {
  position: relative; width: 100%; display: flex; justify-content: center;
  height: clamp(180px, 26vh, 260px); flex-shrink: 0; z-index: 9999;
  transform: scale(var(--island-scale)); transform-origin: top center;
  transition: transform 0.3s var(--spring);
  contain: layout style;
}

.island-glow {
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 400px; height: 250px; border-radius: 50%;
  background: radial-gradient(ellipse, var(--glow-color, rgba(0,0,0,0.1)) 0%, transparent 65%);
  opacity: 0;
  transition: opacity 0.6s var(--ease-out), background 0.6s var(--ease-out);
  pointer-events: none; z-index: 0;
  will-change: opacity;
}
.island-wrap.has-glow .island-glow { opacity: 0.7; }

/* 灵动岛主体 - 玻璃材质感 */
.island {
  position: relative; background: var(--island);
  height: 37px; width: 126px; border-radius: 999px;
  overflow: hidden; z-index: 99999; cursor: pointer;
  transition:
    width 0.5s var(--spring),
    height 0.5s var(--spring),
    border-radius 0.5s var(--spring);
  will-change: width, height, border-radius;
  box-shadow:
    0 1px 0 0.5px rgba(0,0,0,0.4),
    0 10px 30px rgba(0,0,0,0.18),
    0 2px 8px rgba(0,0,0,0.1);
  transform: translateZ(0);
}

/* 顶部高光线 */
.island::after {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  pointer-events: none; z-index: 4;
}

.island:active { transform: translateZ(0) scale(0.97); }

.island .ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  pointer-events: none; transform: scale(0);
  animation: ripple 0.6s var(--ease-out);
  z-index: 3;
}
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

.island-content { width: 100%; height: 100%; position: relative; }

/* 面板通用 */
.panel {
  position: absolute; inset: 0; display: flex; align-items: center; padding: 0 14px;
  opacity: 0; transform: scale(0.92);
  transition: opacity 0.15s var(--ease-in), transform 0.15s var(--ease-in);
  pointer-events: none;
}
.panel.active {
  opacity: 1; transform: scale(1);
  transition: opacity 0.3s var(--ease-out) 0.1s, transform 0.45s var(--spring-soft) 0.1s;
  pointer-events: auto;
}

/* 元素错峰入场 - 方向感 */
.panel .item {
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.3s var(--ease-out), transform 0.35s var(--spring-soft);
}
.panel.active .item { opacity: 1; transform: translateY(0); }
.panel.active .item:nth-child(1) { transition-delay: 0.15s; }
.panel.active .item:nth-child(2) { transition-delay: 0.2s; }
.panel.active .item:nth-child(3) { transition-delay: 0.25s; }
.panel.active .item:nth-child(4) { transition-delay: 0.3s; }

/* 默认 */
.p-default { justify-content: center; gap: 14px; padding: 0; }
.p-default .dot-l { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2.4s ease-in-out infinite; }
.p-default .dot-r { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.4); }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

/* 静音 */
.p-silent { justify-content: space-between; padding: 0 16px; }
.p-silent .wrap { display: flex; align-items: center; gap: 8px; }
.p-silent svg { width: 16px; height: 16px; fill: var(--red); animation: shake 0.5s var(--spring); }
@keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-12deg)} 50%{transform:rotate(10deg)} 75%{transform:rotate(-5deg)} }
.p-silent .txt { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }

/* 充电 */
.p-charge { justify-content: space-between; padding: 0 14px; }
.p-charge svg { width: 14px; height: 16px; fill: var(--yellow); animation: flash 1.4s ease-in-out infinite; }
@keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.p-charge .pct { font-size: 14px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
.p-charge .bat { width: 22px; height: 11px; border: 1.2px solid rgba(255,255,255,0.7); border-radius: 3px; padding: 1px; position: relative; }
.p-charge .bat::after { content: ''; position: absolute; right: -3px; top: 2.5px; width: 2px; height: 4px; background: rgba(255,255,255,0.7); border-radius: 0 1px 1px 0; }
.p-charge .bat-fill { height: 100%; background: var(--green); border-radius: 1px; transition: width 0.4s var(--spring); }

/* 音乐 - 旋转专辑 */
.p-music { padding: 0 16px; gap: 12px; }
.p-music .album { width: 52px; height: 52px; border-radius: 10px; background: linear-gradient(135deg, #ff9f0a, #ff375f, #bf5af2); flex-shrink: 0; position: relative; overflow: hidden; }
.p-music .album::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 50%); }
.p-music .album::after { content: ''; position: absolute; inset: 35%; border-radius: 50%; background: #000; border: 1.5px solid rgba(255,255,255,0.15); }
.p-music .info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.p-music .track { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-music .artist { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.p-music .wave { display: flex; align-items: center; gap: 2.5px; height: 28px; flex-shrink: 0; }
.p-music .wave span { width: 3px; background: var(--orange); border-radius: 2px; animation: wave 0.9s ease-in-out infinite; }
.p-music .wave span:nth-child(1) { height: 30%; animation-delay: 0s; }
.p-music .wave span:nth-child(2) { height: 70%; animation-delay: 0.15s; }
.p-music .wave span:nth-child(3) { height: 100%; animation-delay: 0.3s; }
.p-music .wave span:nth-child(4) { height: 50%; animation-delay: 0.45s; }
@keyframes wave { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

/* 计时器 */
.p-timer { padding: 0 18px; justify-content: space-between; gap: 14px; }
.p-timer .left { display: flex; align-items: center; gap: 10px; }
.p-timer .ring { width: 32px; height: 32px; flex-shrink: 0; }
.p-timer .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.p-timer .ring-bg { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 3; }
.p-timer .ring-fg { fill: none; stroke: var(--orange); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 88; animation: ring 4s linear infinite; }
@keyframes ring { from { stroke-dashoffset: 88; } to { stroke-dashoffset: 0; } }
.p-timer .t-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.p-timer .t-val { font-size: 18px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
.p-timer .pause { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; gap: 3px; }
.p-timer .pause span { width: 3px; height: 10px; background: #fff; border-radius: 1px; }

/* 来电 */
.p-call { padding: 0 16px; gap: 12px; }
.p-call .avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #30d158, #0a84ff); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; animation: breathe-avatar 1.6s ease-in-out infinite; position: relative; }
@keyframes breathe-avatar { 0%, 100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.5); } 50% { box-shadow: 0 0 0 8px rgba(48, 209, 88, 0); } }
.p-call .info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.p-call .name { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; }
.p-call .status { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px; }
.p-call .status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.2s ease-in-out infinite; }
.p-call .actions { display: flex; gap: 8px; flex-shrink: 0; }
.p-call .act-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s var(--spring); }
.p-call .act-btn:active { transform: scale(0.88); }
.p-call .act-btn.hang { background: var(--red); }
.p-call .act-btn.ans { background: var(--green); }
.p-call .act-btn svg { width: 18px; height: 18px; fill: #fff; }
.p-call .act-btn.hang svg { transform: rotate(135deg); }

/* Face ID */
.p-faceid { justify-content: center; align-items: center; padding: 0; }
.p-faceid .scanner { width: 140px; height: 140px; position: relative; }
.p-faceid .corner { position: absolute; width: 24px; height: 24px; border: 2.5px solid var(--teal); }
.p-faceid .tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
.p-faceid .tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
.p-faceid .bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
.p-faceid .br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 8px 0; }
.p-faceid .scan { position: absolute; left: 8px; right: 8px; height: 2px; background: var(--teal); animation: scan 1.8s ease-in-out infinite; }
@keyframes scan { 0%, 100% { top: 12px; opacity: 0.4; } 50% { top: calc(100% - 14px); opacity: 1; } }
.p-faceid .face { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.p-faceid .face svg { width: 70px; height: 70px; fill: none; stroke: var(--teal); stroke-width: 2; opacity: 0.6; }

/* 导航 */
.p-nav { padding: 0 16px; gap: 14px; }
.p-nav .arrow { width: 48px; height: 48px; border-radius: 12px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; animation: arrow 1.4s ease-in-out infinite; }
@keyframes arrow { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
.p-nav .arrow svg { width: 28px; height: 28px; fill: #fff; }
.p-nav .info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.p-nav .dist { font-size: 17px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
.p-nav .road { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.p-nav .eta { font-size: 11px; color: rgba(255,255,255,0.72); }

/* AirDrop */
.p-airdrop { justify-content: center; gap: 14px; padding: 0 18px; }
.p-airdrop .icon { width: 40px; height: 40px; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.p-airdrop .icon svg { width: 100%; height: 100%; fill: var(--blue); }
.p-airdrop .rip { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--blue); animation: rip 1.6s ease-out infinite; opacity: 0; }
.p-airdrop .rip:nth-child(2) { animation-delay: 0.5s; }
.p-airdrop .rip:nth-child(3) { animation-delay: 1s; }
@keyframes rip { 0% { transform: scale(0.3); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }
.p-airdrop .txt { display: flex; flex-direction: column; }
.p-airdrop .t1 { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
.p-airdrop .t2 { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }

/* 通知 */
.p-notif { padding: 0 14px; gap: 12px; align-items: center; }
.p-notif .icon { width: 38px; height: 38px; border-radius: 9px; background: linear-gradient(135deg, #bf5af2, #ff375f); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.p-notif .icon svg { width: 22px; height: 22px; fill: #fff; }
.p-notif .info { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.p-notif .app { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.p-notif .title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-notif .body { font-size: 11px; color: rgba(255,255,255,0.72); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 音量 */
.p-vol { justify-content: center; gap: 14px; padding: 0 20px; }
.p-vol svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }
.p-vol .bars { flex: 1; height: 32px; display: flex; align-items: center; gap: 3px; max-width: 140px; }
.p-vol .bar { flex: 1; background: rgba(255,255,255,0.15); border-radius: 2px; height: 100%; position: relative; overflow: hidden; }
.p-vol .bar::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 2px; transform: scaleY(var(--h, 0)); transform-origin: bottom; transition: transform 0.2s var(--spring); }

/* 录音 */
.p-rec { justify-content: center; gap: 14px; padding: 0 20px; }
.p-rec .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: rec 1s ease-in-out infinite; }
@keyframes rec { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
.p-rec .time { font-size: 18px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
.p-rec .wave { display: flex; align-items: center; gap: 2px; height: 24px; flex-shrink: 0; }
.p-rec .wave span { width: 2.5px; background: var(--red); border-radius: 2px; animation: recw 0.8s ease-in-out infinite; }
.p-rec .wave span:nth-child(odd) { height: 40%; animation-delay: 0s; }
.p-rec .wave span:nth-child(even) { height: 90%; animation-delay: 0.4s; }
@keyframes recw { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }

/* Apple Pay */
.p-pay { justify-content: center; gap: 12px; padding: 0 20px; }
.p-pay .card { width: 50px; height: 32px; border-radius: 6px; background: linear-gradient(135deg, #f5f5f7 0%, #d8d8db 100%); position: relative; flex-shrink: 0; overflow: hidden; }
.p-pay .card::before { content: ''; position: absolute; top: 8px; left: 0; right: 0; height: 1px; background: rgba(0,0,0,0.2); }
.p-pay .card::after { content: ''; position: absolute; bottom: 6px; left: 6px; width: 12px; height: 8px; border-radius: 2px; background: linear-gradient(45deg, #ff9f0a, #ff453a); }
.p-pay .pay-text { display: flex; flex-direction: column; }
.p-pay .pay-l1 { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
.p-pay .pay-l2 { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.p-pay .check { width: 20px; height: 20px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; animation: pay-check 0.5s var(--spring-soft); }
.p-pay .check svg { width: 12px; height: 12px; fill: #fff; }
@keyframes pay-check { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

/* 专注模式 */
.p-focus { justify-content: center; gap: 12px; padding: 0 20px; }
.p-focus .moon { width: 24px; height: 24px; flex-shrink: 0; }
.p-focus .moon svg { width: 100%; height: 100%; fill: var(--indigo); }
.p-focus .focus-text { display: flex; flex-direction: column; }
.p-focus .f1 { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
.p-focus .f2 { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.p-focus .toggle { width: 36px; height: 22px; border-radius: 999px; background: var(--indigo); position: relative; flex-shrink: 0; transition: background 0.3s var(--spring); }
.p-focus .toggle::after { content: ''; position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.3s var(--spring-soft); }

/* 信息区 */
.info-area {
  margin-top: clamp(30px, 6vh, 60px); text-align: center; z-index: 10;
  max-width: min(620px, 92vw); padding: 0 24px; flex: 1; display: flex; flex-direction: column;
}
.badge {
  display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 999px;
  background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08);
  font-size: 11px; font-weight: 600; color: var(--fg-2); letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: clamp(12px, 2vh, 20px); align-self: center; transition: all 0.3s var(--ease-out);
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); transition: background 0.3s var(--ease-out); position: relative; }
.badge .dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: badge-pulse 2s ease-in-out infinite; }
@keyframes badge-pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.8); opacity: 0; } }
.title {
  font-size: clamp(32px, 7vw, 64px); font-weight: 800; letter-spacing: -0.04em;
  background: linear-gradient(180deg, #1d1d1f 0%, rgba(29, 29, 31, 0.6) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: clamp(10px, 1.5vh, 16px); line-height: 1.05;
  transition: opacity 0.2s var(--ease-in), transform 0.35s var(--spring-soft);
}
.desc {
  font-size: clamp(14px, 2vw, 17px); color: var(--fg-2); line-height: 1.5;
  max-width: 540px; margin: 0 auto;
  transition: opacity 0.2s var(--ease-in), transform 0.35s var(--spring-soft);
}
.fading { opacity: 0; transform: translateY(-8px); }

/* 底部控制 */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px max(24px, env(safe-area-inset-left, 0px)) calc(16px + var(--safe-bottom)) max(24px, env(safe-area-inset-right, 0px));
  z-index: 50;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.92) 25%);
}
.controls-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

.auto-bar {
  display: flex; align-items: center; gap: 14px; padding: 10px 14px;
  background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.06); border-radius: 14px;
}
.auto-btn {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  background: var(--fg); color: #fff; border: none; border-radius: 999px;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  flex-shrink: 0; min-height: 36px; transition: transform 0.15s var(--spring), background 0.3s var(--ease-out);
}
.auto-btn:active { transform: scale(0.96); }
.auto-btn.playing { background: var(--orange); }
.auto-btn svg { width: 12px; height: 12px; fill: currentColor; }

.prog-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.prog-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--fg-3); gap: 12px; }
.prog-info .curr { color: var(--fg); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-info .stat { white-space: nowrap; flex-shrink: 0; }
.prog-bar { height: 3px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden; position: relative; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 999px; width: 0%; transition: width 0.1s linear, background 0.3s var(--ease-out); position: relative; }
.prog-fill::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 20px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6)); }

.grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 7px; }
.btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 9px 3px; background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.06);
  border-radius: 11px; cursor: pointer; font-family: inherit; color: var(--fg-3);
  position: relative; overflow: hidden; min-height: 44px; transition: all 0.2s var(--ease-out);
}
.btn::before { content: ''; position: absolute; inset: 0; background: var(--c, var(--orange)); opacity: 0; transition: opacity 0.2s var(--ease-out); }
.btn:hover { border-color: rgba(0,0,0,0.15); transform: translateY(-2px); color: var(--fg); }
.btn:hover::before { opacity: 0.06; }
.btn:active { transform: translateY(0) scale(0.97); }
.btn.active { background: var(--c, var(--orange)); color: #fff; border-color: transparent; }
.btn.active::before { opacity: 0; }
.btn .ico { width: 24px; height: 24px; border-radius: 7px; background: rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: center; transition: background 0.2s var(--ease-out); position: relative; z-index: 1; }
.btn.active .ico { background: rgba(0,0,0,0.15); }
.btn .ico svg { width: 14px; height: 14px; fill: currentColor; }
.btn .lbl { font-size: 9px; font-weight: 600; white-space: nowrap; letter-spacing: 0.02em; position: relative; z-index: 1; }

/* Toast */
.toast {
  position: fixed; bottom: calc(230px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px); padding: 10px 18px;
  background: rgba(29,29,31,0.95); color: #fff; border-radius: 999px;
  font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none;
  transition: all 0.3s var(--ease-out); z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 1200px) { .grid { gap: 6px; } .btn { padding: 8px 2px; } .btn .lbl { font-size: 8px; } }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(7, 1fr); } }
@media (max-width: 600px) { .grid { grid-template-columns: repeat(7, 1fr); } .prog-info .stat { display: none; } .auto-btn .txt { display: none; } }
@media (max-width: 380px) { .btn .lbl { display: none; } .btn .ico { width: 22px; height: 22px; } }
@media (max-height: 600px) and (orientation: landscape) { .grid { grid-template-columns: repeat(14, 1fr); } .desc { display: none; } .title { font-size: 24px; } }
@media (prefers-color-scheme: dark) {
  :root { --bg: #050507; --fg: #fff; --fg-2: rgba(255,255,255,0.7); --fg-3: rgba(255,255,255,0.45); }
  body { background: linear-gradient(180deg, #0a0a0e 0%, #050507 100%); }
  body::before { background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); }
  .badge { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: var(--fg-2); }
  .title { background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%); -webkit-background-clip: text; background-clip: text; }
  .controls { background: linear-gradient(180deg, transparent, rgba(10,10,14,0.92) 25%); }
  .auto-bar { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
  .prog-bar { background: rgba(255,255,255,0.1); }
  .btn { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); color: var(--fg-3); }
  .btn:hover { border-color: rgba(255,255,255,0.15); color: var(--fg); }
  .btn .ico { background: rgba(255,255,255,0.05); }
}
</style>
</head>

<script>
const STATES = [
  { id:'default', label:'待机', w:126, h:37, r:999, glow:'rgba(0,0,0,0.1)', bc:'#30d158', accent:'#30d158', bt:'IDLE · 待机', t:'Dynamic Island', d:'悬浮于屏幕顶部的灵动岛屿，根据使用场景自由变形。', dur:2000, icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>', c:'#30d158' },
  { id:'silent', label:'静音', w:200, h:37, r:999, glow:'rgba(255,69,58,0.15)', bc:'#ff453a', accent:'#ff453a', bt:'SILENT · 静音', t:'勿扰已开启', d:'短按展开形态，提示当前音频输出已切换。', dur:2400, icon:'<svg viewBox="0 0 24 24"><path d="M12 2C10.5 2 9.5 3 9.5 4.5V5C7 5.7 5.5 7.8 5.5 10.5V14L4 16.5V17H20V16.5L18.5 14V10.5C18.5 7.8 17 5.7 14.5 5V4.5C14.5 3 13.5 2 12 2M10 19C10 20.1 10.9 21 12 21S14 20.1 14 19"/></svg>', c:'#ff453a' },
  { id:'charge', label:'充电', w:180, h:37, r:999, glow:'rgba(255,214,10,0.18)', bc:'#ffd60a', accent:'#ffd60a', bt:'CHARGING · 充电', t:'已连接电源', d:'电量信息一目了然。充至 80% 以上将自动折叠。', dur:2600, icon:'<svg viewBox="0 0 24 24"><path d="M11 2L4 11h5l-2 9 9-11h-5l1-7z"/></svg>', c:'#ffd60a' },
  { id:'music', label:'音乐', w:360, h:84, r:42, glow:'rgba(255,159,10,0.22)', bc:'#ff9f0a', accent:'#ff9f0a', bt:'PLAYING · 播放', t:'Midnight City', d:'专辑封面、曲目信息与实时波形聚合于同一形态。', dur:4000, icon:'<svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>', c:'#ff9f0a' },
  { id:'timer', label:'计时', w:240, h:84, r:42, glow:'rgba(255,159,10,0.18)', bc:'#ff9f0a', accent:'#ff9f0a', bt:'TIMER · 计时', t:'倒计时运行中', d:'环形进度与剩余时间持续可见。', dur:3400, icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 9v4l3 2M9 2h6"/></svg>', c:'#ff9f0a' },
  { id:'call', label:'来电', w:360, h:84, r:42, glow:'rgba(48,209,88,0.22)', bc:'#30d158', accent:'#30d158', bt:'CALL · 通话', t:'Alex Chen', d:'来电信息以独立卡片呈现，头像呼吸式高亮。', dur:3600, icon:'<svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.94-1.49-6.04-4.51-7.58-7.53l1.97-1.57c.27-.27.34-.65.23-1.01A11.43 11.43 0 0 1 8.63 3.99c0-.54-.45-.99-.99-.99H3.99C3.45 3 3 3.45 3 3.99C3 13.31 10.69 21 20.01 21c.54 0 .99-.45.99-.99v-3.02c0-.54-.45-.99-.99-.99z"/></svg>', c:'#30d158' },
  { id:'faceid', label:'FaceID', w:220, h:220, r:110, glow:'rgba(100,210,255,0.25)', bc:'#64d2ff', accent:'#64d2ff', bt:'FACE ID · 识别', t:'Face ID 解锁', d:'灵动岛扩展为正方形画布，扫描线沿轮廓移动。', dur:3200, icon:'<svg viewBox="0 0 24 24"><path d="M4 4h4M16 4h4v4M20 16v4h-4M8 20H4v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>', c:'#64d2ff' },
  { id:'nav', label:'导航', w:320, h:84, r:42, glow:'rgba(10,132,255,0.2)', bc:'#0a84ff', accent:'#0a84ff', bt:'NAV · 导航', t:'前方 300 米右转', d:'方向箭头随路径动态指向，距离与路名同步刷新。', dur:3400, icon:'<svg viewBox="0 0 24 24"><path d="M3 12l18-8-8 18-2-8-8-2z"/></svg>', c:'#0a84ff' },
  { id:'airdrop', label:'AirDrop', w:230, h:84, r:42, glow:'rgba(10,132,255,0.18)', bc:'#0a84ff', accent:'#0a84ff', bt:'AIRDROP · 传输', t:'正在接收项目', d:'同心波纹动画表示设备发现与传输状态。', dur:3000, icon:'<svg viewBox="0 0 24 24"><path d="M12 2C7 2 3 6 3 11c0 3 1.5 5.5 4 7l1.5-2C6.5 14.8 5.5 13 5.5 11c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5c0 2-1 3.8-2.5 5L17 18c2.5-1.5 4-4 4-7 0-5-4-9-9-9z"/></svg>', c:'#0a84ff' },
  { id:'notification', label:'通知', w:360, h:110, r:28, glow:'rgba(191,90,242,0.2)', bc:'#bf5af2', accent:'#bf5af2', bt:'NOTIFICATION · 提醒', t:'日历提醒', d:'应用图标、标题与摘要分层级呈现。', dur:3400, icon:'<svg viewBox="0 0 24 24"><path d="M12 2C7 2 3 6 3 11v5l-2 3v1h22v-1l-2-3v-5c0-5-4-9-9-9zm0 20c1.7 0 3-1.3 3-3H9c0 1.7 1.3 3 3 3z"/></svg>', c:'#bf5af2' },
  { id:'volume', label:'音量', w:280, h:84, r:42, glow:'rgba(142,142,147,0.2)', bc:'#8e8e93', accent:'#8e8e93', bt:'VOLUME · 音量', t:'音量已调整', d:'灵动岛临时呈现音量条，数秒后自动收回。', dur:2800, icon:'<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>', c:'#8e8e93' },
  { id:'recording', label:'录音', w:240, h:84, r:42, glow:'rgba(255,69,58,0.22)', bc:'#ff453a', accent:'#ff453a', bt:'RECORDING · 录音', t:'正在录音', d:'红色脉冲点与动态波形指示录音状态。', dur:3000, icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>', c:'#ff453a' },
  { id:'applepay', label:'Pay', w:280, h:84, r:42, glow:'rgba(48,209,88,0.22)', bc:'#30d158', accent:'#30d158', bt:'APPLE PAY · 支付', t:'Apple Pay 完成', d:'卡片信息与支付状态以紧凑形态呈现，安全且即时。', dur:2800, icon:'<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>', c:'#30d158' },
  { id:'focus', label:'专注', w:280, h:84, r:42, glow:'rgba(94,92,230,0.22)', bc:'#5e5ce6', accent:'#5e5ce6', bt:'FOCUS · 专注', t:'专注模式已开启', d:'屏蔽非必要通知，保持当前心流状态。', dur:3000, icon:'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>', c:'#5e5ce6' }
];

const $ = id => document.getElementById(id);
const island = $('island'), wrap = $('islandWrap'), grid = $('stateGrid');
const titleEl = $('stateTitle'), descEl = $('stateDesc'), badgeEl = $('badgeText'), badgeDot = $('badgeDot');
const autoBtn = $('autoBtn'), playIcon = $('playIcon'), autoText = $('autoText');
const progFill = $('progressFill'), currName = $('currentName'), progText = $('progressText');
const toast = $('toast');

STATES.forEach(s => {
  const b = document.createElement('button');
  b.className = 'btn';
  b.dataset.state = s.id;
  b.style.setProperty('--c', s.c);
  b.innerHTML = `<div class="ico">${s.icon}</div><div class="lbl">${s.label}</div>`;
  b.addEventListener('click', () => { if (autoPlaying) stopAuto(); setState(s.id, true); });
  grid.appendChild(b);
});

let curState = 'default';

function setState(id, manual = false) {
  const s = STATES.find(x => x.id === id);
  if (!s || (curState === id && !manual)) return;
  curState = id;

  island.style.width = s.w + 'px';
  island.style.height = s.h + 'px';
  island.style.borderRadius = s.r + 'px';

  wrap.style.setProperty('--glow-color', s.glow);
  wrap.classList.toggle('has-glow', s.id !== 'default');

  document.documentElement.style.setProperty('--accent', s.accent);

  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === id));

  [titleEl, descEl, badgeEl].forEach(el => el.classList.add('fading'));
  setTimeout(() => {
    titleEl.textContent = s.t;
    descEl.textContent = s.d;
    badgeEl.textContent = s.bt;
    badgeDot.style.background = s.bc;
    [titleEl, descEl, badgeEl].forEach(el => el.classList.remove('fading'));
  }, 180);

  document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.state === id));

  if (autoPlaying) {
    currName.textContent = s.label;
    progText.textContent = `自动演示 ${STATES.findIndex(x => x.id === id) + 1} / ${STATES.length}`;
  } else {
    currName.textContent = s.label;
    progText.textContent = '手动模式';
  }

  if (s.id === 'charge') startCharge();
  if (s.id === 'timer') startTimer();
  if (s.id === 'volume') startVol();
  if (s.id === 'recording') startRec();
}

island.addEventListener('click', e => {
  const rect = island.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 0.6;
  ripple.style.width = size + 'px';
  ripple.style.height = size + 'px';
  ripple.style.left = (x - size/2) + 'px';
  ripple.style.top = (y - size/2) + 'px';
  island.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  e.stopPropagation();
  const i = STATES.findIndex(s => s.id === curState);
  setState(STATES[(i + 1) % STATES.length].id, true);
});

let chargeT, chargeLv = 85;
function startCharge() {
  clearInterval(chargeT); chargeLv = 85;
  const p = $('chargePct'), f = $('chargeFill');
  chargeT = setInterval(() => {
    chargeLv = (chargeLv % 100) + 1;
    if (p) p.textContent = chargeLv + '%';
    if (f) f.style.width = chargeLv + '%';
  }, 120);
}

let timerT, timerS = 754;
function startTimer() {
  clearInterval(timerT); timerS = 754;
  const el = $('timerValue');
  timerT = setInterval(() => {
    timerS = Math.max(0, timerS - 1);
    if (!el) return;
    const m = Math.floor(timerS / 60), s = timerS % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

let volT, volTick = 0;
function startVol() {
  clearInterval(volT); volTick = 0;
  const bars = document.querySelectorAll('#volBars .bar');
  volT = setInterval(() => {
    volTick++;
    bars.forEach((bar, i) => {
      const w = Math.sin((volTick / 5) + (i * 0.7)) * 0.4 + 0.5;
      bar.style.setProperty('--h', Math.max(0.1, Math.min(1, w)).toFixed(2));
    });
  }, 80);
}

let recT, recS = 5;
function startRec() {
  clearInterval(recT); recS = 5;
  const el = $('recTime');
  recT = setInterval(() => {
    recS++;
    if (!el) return;
    const m = Math.floor(recS / 60), s = recS % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

let autoPlaying = false, autoStart = 0, autoIdx = 0, autoRaf = null;
let lastProgUpdate = 0;

function startAuto() {
  autoPlaying = true;
  autoBtn.classList.add('playing');
  autoText.textContent = '暂停';
  playIcon.innerHTML = '<rect x="2" y="1" width="3" height="10" rx="0.5"/><rect x="7" y="1" width="3" height="10" rx="0.5"/>';
  autoStart = performance.now();
  lastProgUpdate = autoStart;
  showToast('自动演示开始');
  loop();
}

function stopAuto() {
  autoPlaying = false;
  autoBtn.classList.remove('playing');
  autoText.textContent = '开始演示';
  playIcon.innerHTML = '<path d="M2 1l9 5-9 5z"/>';
  cancelAnimationFrame(autoRaf);
  progFill.style.width = '0%';
  progText.textContent = '手动模式';
  currName.textContent = STATES.find(s => s.id === curState).label;
}

function loop(now) {
  if (!autoPlaying) return;
  if (!now) now = performance.now();
  const s = STATES[autoIdx];
  const elapsed = now - autoStart;
  const progress = Math.min(1, elapsed / s.dur);

  if (now - lastProgUpdate > 100) {
    progFill.style.width = (progress * 100) + '%';
    lastProgUpdate = now;
  }

  if (progress >= 1) {
    autoIdx = (autoIdx + 1) % STATES.length;
    autoStart = now;
    lastProgUpdate = now;
    progFill.style.width = '0%';
    setState(STATES[autoIdx].id);
  }
  autoRaf = requestAnimationFrame(loop);
}

autoBtn.addEventListener('click', () => {
  if (autoPlaying) stopAuto();
  else { autoIdx = 0; setState(STATES[0].id); setTimeout(startAuto, 50); }
});

let toastT;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove('show'), 1500);
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); autoBtn.click(); }
  else if (e.key === 'ArrowRight') {
    if (autoPlaying) stopAuto();
    const i = STATES.findIndex(s => s.id === curState);
    setState(STATES[(i + 1) % STATES.length].id, true);
  } else if (e.key === 'ArrowLeft') {
    if (autoPlaying) stopAuto();
    const i = STATES.findIndex(s => s.id === curState);
    setState(STATES[(i - 1 + STATES.length) % STATES.length].id, true);
  }
});

function scaleIsland() {
  const w = window.innerWidth, h = window.innerHeight;
  const aw = w * 0.92, ah = h * 0.32;
  let sc = Math.min(aw / 360, ah / 220, 1);
  document.documentElement.style.setProperty('--island-scale', Math.max(0.5, sc).toFixed(3));
}
let rT;
window.addEventListener('resize', () => { cancelAnimationFrame(rT); rT = requestAnimationFrame(scaleIsland); });
window.addEventListener('orientationchange', () => setTimeout(scaleIsland, 100));
scaleIsland();

setState('default');
setTimeout(() => { if (!autoPlaying) { autoIdx = 0; setState(STATES[0].id); setTimeout(startAuto, 100); } }, 1200);

document.addEventListener('visibilitychange', () => {
  if (document.hidden && autoPlaying) cancelAnimationFrame(autoRaf);
  else if (!document.hidden && autoPlaying) {
    autoStart = performance.now() - (parseFloat(progFill.style.width) / 100) * STATES[autoIdx].dur;
    lastProgUpdate = performance.now();
    loop();
  }
});
</script>
</body>
</html>
